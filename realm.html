<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Realm - TwinFlow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #canvas-container {
            position: relative;
            width: 600px;
            height: 800px;
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.03);
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            color: rgba(255, 255, 255, 0.2);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            pointer-events: none;
            z-index: 10;
            user-select: none;
        }
        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            margin-bottom: 0.5rem;
        }
        #counter {
            font-size: 3rem;
            font-weight: 100;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="ui-layer">
            <div class="label">Vibe Sync</div>
            <div id="counter">0</div>
        </div>
    </div>

    <script>
        /**
         * TwinFlow - The Realm
         * Staircase Waterway Particle System
         */

        // 1. Broadcast Listeners
        const counterDisplay = document.getElementById('counter');
        const vibeChannel = new BroadcastChannel('twinflow_vibe');
        let currentVibe = 0;
        let lastInputTime = 0;
        let currentSpeedMult = 0.18; // Start slow
        let targetSpeed = 0.18;
        const IDLE_THRESHOLD = 1500; // 1.5 seconds to idle

        const handleUpdate = (data, source) => {
            console.log(`B-Screen Received (${source}):`, data);
            currentVibe = data;
            counterDisplay.textContent = currentVibe;
            lastInputTime = Date.now();
            targetSpeed = 1.0; // Wake up immediately
        };

        // BroadcastChannel Listener (Primary for the Peer-to-Peer Tab mode)
        vibeChannel.onmessage = (event) => {
            if (event.data && event.data.type === 'VIBE_UPDATE') {
                handleUpdate(event.data.val, 'BroadcastChannel');
            }
        };

        // Fallback: window.message if someone still tries to postMessage
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === 'VIBE_UPDATE') {
                handleUpdate(event.data.val, 'postMessage');
            }
        });

        // 2. p5.js Staircase Waterway Implementation
        let particles = [];
        let time = 0;
        const MAX_PARTICLES = 6000; 

        function setup() {
            const canvas = createCanvas(600, 800);
            canvas.parent('canvas-container');
            background(0);
            lastInputTime = Date.now(); // Initialize
        }

        function draw() {
            // Update speed multiplier smoothly
            if (Date.now() - lastInputTime > IDLE_THRESHOLD) {
                targetSpeed = 0.18;
            }
            currentSpeedMult = lerp(currentSpeedMult, targetSpeed, 0.05);

            // Background with slight fading and blur to create the "liquid" trail effect
            background(0, 9);
            filter(BLUR);
            stroke(255);

            /* ---- Particle Creation ---- */
            // Adjust spawn rate based on speed to prevent stacking
            let spawnRate = 9 * currentSpeedMult;
            let i = floor(spawnRate);
            if (random() < (spawnRate % 1)) i++; 

            while (i > 0) {
                i--;
                let index = time % MAX_PARTICLES;
                
                // x-position drifts horizontally
                let px = (time * 99) % width;

                particles[index] = {
                    x: px,
                    y: 0,
                    g: 0, // vertical acceleration
                    s: 3  // initial size
                };
                time++;
            }

            /* ---- Particle Update & Render ---- */
            for (let idx = 0; idx < particles.length; idx++) {
                let p = particles[idx];
                if (!p) continue;

                // Slowly shrink the droplet - scaled by speed to maintain visual path length
                p.s *= (1 - 0.003 * currentSpeedMult);
                strokeWeight(p.s);

                // Perlin noise guides the "staircase" motion
                let n = noise(p.x / width, p.y / 9, time / width);

                if (n > 0.4) {
                    // Mode: Free Fall
                    p.g += 0.5 * currentSpeedMult;
                    p.y += p.g * currentSpeedMult;
                } else {
                    // Mode: Staircase Slide
                    // Horizontal jitter - scaled by speed
                    if (n % 0.1 > 0.05) {
                        p.x += 1 * currentSpeedMult;
                    } else {
                        p.x -= 1 * currentSpeedMult;
                    }
                    // Slow descent - scaled by speed
                    p.g = 0;
                    p.y += 0.5 * currentSpeedMult;
                }

                // Render the particle
                point(p.x, p.y);

                // Optimization
                if (p.y > height || p.s < 0.1) {
                    particles[idx] = null;
                }
            }
        }

        // windowResized removed to maintain fixed 600x800 size
    </script>
</body>
</html>
